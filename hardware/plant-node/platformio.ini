[env]
platform = espressif32
board = adafruit_metro_esp32s3
framework = arduino
lib_extra_dirs = ../lib
lib_deps =
    knolleary/PubSubClient
    bblanchon/ArduinoJson
    marcoschwartz/LiquidCrystal_I2C
    jandrassy/TelnetStream

[env:usb]
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
; Native USB on the Metro ESP32-S3 loses the port during esptool's default RTS/DTR
; reset. no_reset tells esptool to skip that — put the board in bootloader mode
; manually (hold BOOT + press RST) before running hw:upload.
upload_flags = --before no_reset

[env:ota]
upload_protocol = espota
; OTA host is supplied at flash time by flash.js (--name -> <name>.local), e.g.
;   npm run hw:upload -- --transport ota --name office_tower --room office
monitor_rts = 0
monitor_dtr = 0
