[env]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -I ${PROJECT_DIR}/../lib/shared
lib_deps =
    knolleary/PubSubClient
    bblanchon/ArduinoJson
    marcoschwartz/LiquidCrystal_I2C
    jandrassy/TelnetStream

[env:usb]
monitor_speed = 115200

[env:ota]
upload_protocol = espota
upload_port = office_tower.local
monitor_port = socket://office_tower.local:23
monitor_rts = 0
monitor_dtr = 0
