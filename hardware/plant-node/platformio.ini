[env]
platform = espressif32
board = esp32dev
framework = arduino
lib_extra_dirs = ../lib
lib_deps =
    knolleary/PubSubClient
    bblanchon/ArduinoJson
    marcoschwartz/LiquidCrystal_I2C
    jandrassy/TelnetStream

[env:usb]
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

[env:ota]
upload_protocol = espota
; OTA host is supplied at flash time by flash.js (--name -> <name>.local), e.g.
;   npm run hw:upload -- --transport ota --name office_tower --room office
monitor_rts = 0
monitor_dtr = 0
